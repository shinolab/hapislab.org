name: Continuous Integration

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: astral-sh/setup-uv@v7
      - run: cd scripts && uv run python check_data.py
      - run: cd scripts && uv run python check_orphans.py
      - run: |
          npm run preview -- --port 4321 &
          npx wait-on http://localhost:4321/
          cd scripts && uv run python check_links.py http://localhost:4321/
